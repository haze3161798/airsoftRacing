<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" fill="none">
  <defs>
    <!-- Skewed background shape -->
    <clipPath id="bg-clip">
      <polygon points="12,4 328,4 322,86 6,86" />
    </clipPath>
    <!-- 75-degree diagonal split: left half -->
    <clipPath id="split-left">
      <polygon points="0,0 174,0 162,90 0,90" />
    </clipPath>
    <!-- 75-degree diagonal split: right half -->
    <clipPath id="split-right">
      <polygon points="174,0 340,0 340,90 162,90" />
    </clipPath>
  </defs>

  <!-- Background: dark skewed box with orange border -->
  <polygon points="12,4 328,4 322,86 6,86" fill="#1a1a2e" stroke="#FF5500" stroke-width="2.5" />
  <!-- Inner border line -->
  <polygon points="18,9 322,9 317,81 12,81" fill="none" stroke="#FF5500" stroke-width="0.8" opacity="0.4" />

  <!-- Top accent line -->
  <line x1="60" y1="5" x2="280" y2="5" stroke="#FF5500" stroke-width="3" />

  <!-- 極限速度 - main text, large bold, orange left / white right -->
  <!-- Shadow layer -->
  <text x="170" y="46" text-anchor="middle" font-family="'Arial Black', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif" font-size="36" font-weight="900" letter-spacing="12" fill="#0d0d1a" transform="translate(2,2)">極限速度</text>
  <!-- Orange outline/stroke -->
  <text x="170" y="46" text-anchor="middle" font-family="'Arial Black', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif" font-size="36" font-weight="900" letter-spacing="12" fill="none" stroke="#FF5500" stroke-width="3">極限速度</text>
  <!-- Left half: orange fill -->
  <text x="170" y="46" text-anchor="middle" font-family="'Arial Black', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif" font-size="36" font-weight="900" letter-spacing="12" fill="#FF5500" clip-path="url(#split-left)">極限速度</text>
  <!-- Right half: white fill -->
  <text x="170" y="46" text-anchor="middle" font-family="'Arial Black', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif" font-size="36" font-weight="900" letter-spacing="12" fill="white" clip-path="url(#split-right)">極限速度</text>

  <!-- Airsoft Contest - subtitle, white left / orange right -->
  <!-- Decorative dashes around subtitle -->
  <line x1="50" y1="66" x2="105" y2="66" stroke="#FF5500" stroke-width="1.5" />
  <line x1="235" y1="66" x2="290" y2="66" stroke="#FF5500" stroke-width="1.5" />
  <!-- Shadow layer -->
  <text x="170" y="72" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-size="16" font-weight="900" letter-spacing="5" fill="#0d0d1a" transform="translate(1,1)">AIRSOFT CONTEST</text>
  <!-- Left half: white -->
  <text x="170" y="72" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-size="16" font-weight="900" letter-spacing="5" fill="white" clip-path="url(#split-left)">AIRSOFT CONTEST</text>
  <!-- Right half: orange -->
  <text x="170" y="72" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-size="16" font-weight="900" letter-spacing="5" fill="#FF5500" clip-path="url(#split-right)">AIRSOFT CONTEST</text>

  <!-- Bottom accent line -->
  <line x1="60" y1="85" x2="280" y2="85" stroke="#FF5500" stroke-width="2" opacity="0.6" />
</svg>
