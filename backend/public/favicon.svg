<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A1A"/>
      <stop offset="100%" stop-color="#FF4400"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#0f0f1e"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Top accent bar -->
  <rect x="14" y="4" width="36" height="2.5" rx="1" fill="#FF5500"/>

  <!-- "A" - orange, left -->
  <text x="8" y="48" font-family="'Arial Black','Impact',sans-serif" font-size="38" font-weight="900" fill="#FF5500">A</text>

  <!-- "/" - white slash -->
  <text x="30" y="48" font-family="'Arial Black','Impact',sans-serif" font-size="38" font-weight="900" fill="white" opacity="0.85">/</text>

  <!-- "S" - white, right -->
  <text x="38" y="48" font-family="'Arial Black','Impact',sans-serif" font-size="38" font-weight="900" fill="white">S</text>

  <!-- Bottom accent bar -->
  <rect x="14" y="57.5" width="36" height="2" rx="1" fill="#FF5500" opacity="0.7"/>
</svg>
