<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" fill="#1A1A2E"/>
  <rect width="1200" height="400" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="400">
      <stop offset="0%" stop-color="#FF5500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Decorative lines -->
  <line x1="50" y1="350" x2="400" y2="50" stroke="#FF5500" stroke-width="2" opacity="0.2"/>
  <line x1="200" y1="400" x2="600" y2="0" stroke="#FF5500" stroke-width="1" opacity="0.15"/>
  <line x1="800" y1="400" x2="1150" y2="50" stroke="#FF5500" stroke-width="2" opacity="0.2"/>
  <!-- Crosshair -->
  <circle cx="600" cy="180" r="40" stroke="#FF5500" stroke-width="2" fill="none" opacity="0.4"/>
  <line x1="600" y1="130" x2="600" y2="230" stroke="#FF5500" stroke-width="1" opacity="0.4"/>
  <line x1="550" y1="180" x2="650" y2="180" stroke="#FF5500" stroke-width="1" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="185" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="8">AIRSOFT RACING</text>
  <text x="600" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#999" letter-spacing="4">氣槍競速電競賽事</text>
  <!-- Accent bar -->
  <rect x="250" y="260" width="700" height="3" rx="1.5" fill="#FF5500" opacity="0.6"/>
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666" letter-spacing="2">2026 SEASON NOW OPEN</text>
</svg>
